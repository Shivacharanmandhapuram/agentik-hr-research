<script type="application/json" id="md">"# AI Colleagues Platform Рђћ Architecture Diagrams\n\n> Generated from the **actual deployed code** (Prisma schema + RBAC map + API routes), not the original plan.\n> Source of truth: `prisma/schema.prisma`, `src/lib/rbac/index.ts`, `src/app/api/**`.\n\n---\n\n## 1. Actors & Roles\n\nThere are **two independent role systems** that combine per user:\n\n| Role | Type | How it's granted | Key capabilities |\n|---|---|---|---|\n| **Anonymous Visitor** | external | none (public) | chat with a *published + deployed + public* agent; request human handover |\n| **Employee** | HRMS-derived | any User linked to an `Employee` (JIT email match on login) | chat with Employee VA, view profile/leave, apply/cancel leave, escalate to case |\n| **Manager** | HRMS-derived | `Employee.reports.length > 0` (has direct reports) | everything an Employee can + decide approvals for their reports |\n| **support_agent** | platform (RoleBinding) | assigned by owner/admin via `/api/roles` | `inbox.view`, `inbox.reply` |\n| **analyst** | platform (RoleBinding) | assigned by owner/admin | `analytics.view` |\n| **domain_admin** | platform (RoleBinding) | assigned by owner/admin (can be agent-scoped) | configure/publish/deploy agents, knowledge, skills, inbox, analytics |\n| **admin** | platform (RoleBinding) | assigned by owner | all of domain_admin + users.manage, roles, audit, directory, integrations, hrms.sync |\n| **owner** | platform (RoleBinding) | auto-granted to the workspace creator at signup | `*` (everything) |\n\n**Key idea:** *Platform roles* (RoleBinding) govern the builder/governance surface (`can()`).\n*HRMS roles* (employee/manager) govern the delegated employee surface (`canAsUser()` Рђћ the AI acts as the user). A person can be both (e.g., the owner who is also an employee with reports).\n\n---\n\n## How to read this document\n\nEvery diagram below is followed by a three-part panel:\n- **Read this to understand** Рђћ the one-line purpose of the diagram.\n- **Elements** Рђћ what each box/actor/class is and what it connects to.\n- **User stories that create these connections** Рђћ the requirement(s) whose flow produces those edges, using the locked IDs from `docs/planning/PLANNING.md ┬Д3`.\n\n**Story status legend:** РюЁ built & deployed ┬и ­ЪЪА partial / lite / mock ┬и РЏћ later.\n**Story ID prefixes:** `EMP-` Employee ┬и `MGR-` Manager ┬и `DA-` Domain Admin ┬и `WA-` Workspace Admin/Owner ┬и `SA-` Support Agent ┬и `AN-` Analyst ┬и `EV-` External Visitor.\n\n---\n\n## 2. Use Case Diagrams\n\n### 2a. Anonymous Visitor & Employee (the consumption surface)\n\n```mermaid\nflowchart LR\n  visitor([\" Anonymous Visitor \"])\n  employee([\" Employee \"])\n\n  subgraph PUB[\" Public Channel \"]\n    p1(\" Chat with public agent \")\n    p2(\" Request human handover \")\n    p3(\" Leave contact info / lead \")\n  end\n\n  subgraph EVA[\" Employee Virtual Assistant \"]\n    e1(\" Ask HR question / search knowledge \")\n    e2(\" Check leave balance \")\n    e3(\" View my profile \")\n    e4(\" Apply for leave (confirm-gated) \")\n    e5(\" Cancel leave (confirm-gated) \")\n    e6(\" Escalate to human Рєњ open Case \")\n    e7(\" See my notifications \")\n  end\n\n  visitor --> p1 --> p2\n  visitor --> p3\n  employee --> e1\n  employee --> e2\n  employee --> e3\n  employee --> e4\n  employee --> e5\n  employee --> e6\n  employee --> e7\n\n  p2 -. creates .-> INBOX[(\" Live Inbox<br/>handed-off only \")]\n  e6 -. creates .-> CASE[(\" Case \")]\n  e4 -. routes to .-> APPR[(\" Approval Рєњ manager \")]\n```\n\n**Read this to understand:** what an end user (anonymous website visitor, or a signed-in employee) can actually *do* Рђћ the consumption surface where conversations and the action spine begin.\n\n**Elements**\n\n| Element | What it is | Connects to |\n|---|---|---|\n| Anonymous Visitor | unauthenticated user on a public, deployed agent | Public Channel only; never reaches internal data |\n| Employee | a `User` linked to an `Employee` (JIT email match) | Employee Virtual Assistant (`/assistant`) |\n| Public Channel | `/chat/[agentId]` Рєњ persists a `Conversation` | Live Inbox (only after handover) |\n| Employee VA | `/api/assistant/chat` Рєњ skill registry; **not persisted = private** | read skills, Confirmation, Case |\n| Live Inbox / Case / Approval | downstream artifacts created by escalation/actions | Manager / Support Agent surfaces |\n\n**User stories that create these connections**\n\n| Story | As aРђд I wantРђд | Connection it creates | Endpoint / entities |\n|---|---|---|---|\n| EV-1 РюЁ | visitor: chat with a public colleague without signing in | Visitor Рєњ public agent | `/chat/[id]` Рєњ `Conversation` |\n| EV-2 РюЁ | visitor: answers from public KB only | public agent Рєњ knowledge (filtered) | `searchKnowledge` |\n| EV-3 РюЁ | visitor: leave name/email | Visitor Рєњ Lead | `Lead` |\n| EV-4 ­ЪЪА | visitor: escalate to a human | public chat Рєњ Live Inbox | `Conversation.handedOff` |\n| EV-5 РюЁ | visitor: be blocked from anything internal | (negative) no edge to internal data | guardrails |\n| EMP-1 РюЁ | employee: sign in and land in my assistant | Employee Рєњ Employee VA | JIT link, `/assistant` |\n| EMP-3,4,5,6,17 РюЁ/­ЪЪА | cited answers, follow-ups, no fabrication, right colleague | Employee VA Рєњ knowledge | `searchKnowledge` (role-filtered) |\n| EMP-8 РюЁ | check my leave balance | Employee VA Рєњ read skill | `get_leave_balance` |\n| EMP-7 РюЁ | view my profile | Employee VA Рєњ read skill | `get_profile` |\n| EMP-9, EMP-12 РюЁ | apply leave from chat, confirm first | Employee VA Рєњ Confirmation Рєњ Approval | `apply_leave` Рєњ `Confirmation` Рєњ `ApprovalRequest` |\n| EMP-10, EMP-12 РюЁ | cancel my pending leave | Employee VA Рєњ Confirmation | `cancel_leave` |\n| EMP-13,14,15 ­ЪЪА | escalate / raise a case | Employee VA Рєњ Case | `create_case` Рєњ `Case` |\n| EMP-16 ­ЪЪА | be notified of decisions | Employee Рєњ Notification | `Notification` |\n\n---\n\n### 2b. Manager (the approvals surface)\n\n```mermaid\nflowchart LR\n  mgr([\" Manager \"])\n\n  subgraph MGR[\" Manager Console \"]\n    m1(\" View pending approvals (my reports only) \")\n    m2(\" Approve request \")\n    m3(\" Reject request \")\n    m4(\" See approval history \")\n    m5(\" Get notified of new requests \")\n  end\n\n  mgr --> m1 --> m2\n  m1 --> m3\n  mgr --> m4\n  mgr --> m5\n\n  m2 -. executes + audits .-> EXE[(\" leave.approved + notify requester \")]\n  m3 -. audits .-> EXE2[(\" leave.rejected + notify requester \")]\n  note1[\" Guard: cannot approve own request<br/>Guard: only requests routed to me \"]\n  m1 -.-> note1\n```\n\n**Read this to understand:** the *other half* of the leave flow Рђћ how a manager sees and decides requests that employees submitted, and the guards that keep it scoped and safe.\n\n**Elements**\n\n| Element | What it is | Connects to |\n|---|---|---|\n| Manager | an `Employee` with `reports.length > 0` (HRMS-derived) | Manager Console (`/approvals`) |\n| Manager Console | `/approvals` UI + `GET/POST /api/approvals` | `ApprovalRequest`, `Notification`, `AuditLog` |\n| Decision execution | `decideApproval()` flips status, audits, notifies | `ApprovalRequest`, `AuditLog`, `Notification` |\n| Guards | self-approval block + approver-scope check | enforced in `decideApproval` + route |\n\n**User stories that create these connections**\n\n| Story | As a Manager I wantРђд | Connection it creates | Endpoint / entities |\n|---|---|---|---|\n| MGR-4 РюЁ | see pending approvals waiting on me | Manager Рєњ pending `ApprovalRequest` | `GET /api/approvals` (status=pending) |\n| MGR-5 РюЁ | approve/reject a report's leave after confirm | Manager Рєњ decision Рєњ execute+audit+notify | `POST /api/approvals` Рєњ `decideApproval` |\n| MGR-7 РюЁ | see full context before deciding | approval payload Рєњ decision card | `ApprovalRequest.payload` |\n| MGR-8 РюЁ | approvals gated to my direct reports only | scope guard (wrong-manager denied+logged) | `approverEmployeeId` filter + `auditDeny` |\n| MGR-9 РюЁ | be notified when a report submits | submit Рєњ `Notification` to approver | `approval_pending` notification |\n| MGR-11 РюЁ | manager-only options shown only to managers | `isManager` gate on nav | `/api/auth/me.isManager` |\n| MGR-1, MGR-2 РюЁ | view team roster / report's leave | Manager Рєњ Directory (reports) | `/api/directory`, `Employee.reports` |\n\n---\n\n### 2c. Support Agent & Analyst (operations surface)\n\n```mermaid\nflowchart LR\n  sa([\" Support Agent \"])\n  an([\" Analyst \"])\n\n  subgraph OPS[\" Operations \"]\n    s1(\" View Live Inbox (escalated convos) \")\n    s2(\" Read handed-off conversation \")\n    s3(\" AI-suggested reply \")\n    s4(\" Reply as human agent \")\n    a1(\" View analytics dashboard \")\n  end\n\n  sa --> s1 --> s2 --> s3 --> s4\n  an --> a1\n\n  note2[\" inbox.view / inbox.reply required<br/>preview & non-escalated convos hidden \"]\n  s1 -.-> note2\n```\n\n**Read this to understand:** the two *composable* operational capabilities Рђћ handling escalated conversations (Support Agent) and reading aggregate metrics (Analyst). Both are platform roles assigned via `RoleBinding`, not HRMS-derived.\n\n**Elements**\n\n| Element | What it is | Connects to |\n|---|---|---|\n| Support Agent | holder of `inbox.view` + `inbox.reply` | Live Inbox (`/inbox`) |\n| Analyst | holder of `analytics.view` | Analytics dashboard (`/analytics`) |\n| Live Inbox | `/api/conversations` Рђћ only `handedOff=true`, `channelРЅаpreview` | `Conversation`, `Message` |\n| AI-suggested reply | `/api/conversations/[id]/suggest` (copilot draft) | `searchKnowledge`, LLM |\n| Analytics | `/api/analytics` (aggregate counts, preview excluded) | `Conversation`, `Message`, `Lead` |\n\n**User stories that create these connections**\n\n| Story | As aРђд I wantРђд | Connection it creates | Endpoint / entities |\n|---|---|---|---|\n| SA-1 РюЁ | see handed-off conversations needing a human | Agent Рєњ escalated `Conversation` | `GET /api/conversations` |\n| SA-3 РюЁ | read full AI context then reply as human | Agent Рєњ `Message` (role=agent) | `/messages`, `/suggest` |\n| SA-5 РюЁ | change status (openРєњresolved) | Agent Рєњ conversation status | `Conversation.status` |\n| SA-2, SA-4 ­ЪЪА | claim a conversation / internal notes | (later) ownership + notes | Рђћ |\n| SA-6 РюЁ | only access my workspace's conversations | tenant scope on every read | `agent.orgId` filter |\n| AN-1, AN-2 ­ЪЪА | usage + resolution/escalation metrics | Analyst Рєњ analytics | `/api/analytics` |\n| AN-4 РюЁ | read-only, no config/actions | (negative) analytics only | `analytics.view` only |\n\n---\n\n### 2d. Admin & Owner (builder + governance surface)\n\n```mermaid\nflowchart LR\n  admin([\" Admin \"])\n  owner([\" Owner \"])\n\n  subgraph BUILD[\" Agent Studio \"]\n    b1(\" Create / configure agent \")\n    b2(\" Manage knowledge sources & folders \")\n    b3(\" Attach skills / actions \")\n    b4(\" Publish agent (snapshot) \")\n    b5(\" Deploy agent to channel \")\n    b6(\" Test agent (preview, private) \")\n  end\n\n  subgraph GOV[\" Governance \"]\n    g1(\" Sync HRMS Рєњ Directory \")\n    g2(\" Assign / revoke roles \")\n    g3(\" View audit log \")\n    g4(\" View analytics \")\n    g5(\" Manage integrations \")\n  end\n\n  admin --> b1 & b2 & b3 & b4 & b5 & b6\n  admin --> g1 & g3 & g4\n  owner --> g2\n  owner --> admin\n\n  b4 -. gates .-> PUBCHAN[(\" Public chat serves<br/>published snapshot only \")]\n  g2 -. writes .-> RB[(\" RoleBinding \")]\n  g1 -. writes .-> DIR[(\" Employee records \")]\n```\n\n---\n\n**Read this to understand:** how colleagues (agents) are built, published, and deployed, and how the workspace is governed (HRMS sync, roles, audit). This is the source of everything the other surfaces consume.\n\n**Elements**\n\n| Element | What it is | Connects to |\n|---|---|---|\n| Agent Studio | `/agents` builder Рєњ `Agent` + draft config | `KnowledgeSource`, `AgentAction`, publish/deploy |\n| Publish | snapshots draft into `Agent.publishedConfig` | what public chat serves |\n| Deploy | flips `Agent.deployed` (+ `Deployment` per channel) | public chat availability |\n| Preview test | `/api/agents/[id]/chat` tagged `channel=preview` | private; excluded from inbox/analytics |\n| HRMS sync | `/api/hrms/sync` via `HrmsConnection` provider | creates `Employee` records + manager edges |\n| Roles | `/api/roles` assign/revoke | `RoleBinding` |\n| Audit | `/api/audit` | `AuditLog` |\n\n**User stories that create these connections**\n\n| Story | As aРђд I wantРђд | Connection it creates | Endpoint / entities |\n|---|---|---|---|\n| DA-1, DA-2 РюЁ | create/configure a colleague | Admin Рєњ `Agent` | `/api/agents` |\n| DA-3 РюЁ | set Access mode (internal/public) | Agent Рєњ access policy | `Agent.accessMode` |\n| DA-4 РюЁ | publish (snapshot) | Agent Рєњ `publishedConfig` | `/api/agents/[id]/publish` |\n| DA-5 РюЁ | deploy to channels | Agent Рєњ deployed + `Deployment` | `/api/agents/[id]/deploy` |\n| DA-6 РюЁ | test in live preview | Admin Рєњ preview `Conversation` | `channel=preview` |\n| DA-7, DA-9 РюЁ | attach/test knowledge | Agent Рєњ `KnowledgeSource` | `/api/agents/[id]/knowledge` |\n| DA-8 РюЁ | role/audience access on folders | Agent Рєњ `KnowledgeFolder.allowedRoles` | filter-then-prompt |\n| DA-10, DA-11 РюЁ | add skills, mark confirm-required | Agent Рєњ `AgentAction` | `/api/agents/[id]/actions` |\n| DA-13 РюЁ | set guardrails | Agent Рєњ `guardrails` | `Agent.guardrails` |\n| DA-14 РюЁ | be scoped to my colleague only | colleague-scoped `RoleBinding` | `can(user, cap, agentId)` |\n| WA-1 РюЁ | set up our workspace | Owner Рєњ `Organization` | signup |\n| WA-3, WA-4 РюЁ | connect+sync HRMS, see directory | Org Рєњ `Employee` records | `/api/hrms/sync`, `/api/directory` |\n| WA-5 РюЁ | assign platform roles | Owner Рєњ `RoleBinding` | `POST /api/roles` |\n| WA-6 РюЁ | view audit log of sensitive actions | Owner Рєњ `AuditLog` | `GET /api/audit` |\n| WA-9, DA-12 ­ЪЪА | manage integration providers | Org Рєњ `HrmsConnection` | provider interface |\n| WA-12 ­ЪЪА | (Owner) transfer/delete workspace | Owner-only destructive | Рђћ (later) |\n\n---\n\n## 3. Class Diagrams (data model)\n\n### 3a. High-level context Рђћ the four subsystems\n\n```mermaid\nflowchart TB\n  subgraph IDN[\" Identity & Governance \"]\n    Organization\n    User\n    Employee\n    HrmsConnection\n    RoleBinding\n    AuditLog\n  end\n\n  subgraph STU[\" Agent Studio & Knowledge \"]\n    Agent\n    KnowledgeSource\n    KnowledgeFolder\n    KnowledgeChunk\n    ActionDefinition\n    Deployment\n  end\n\n  subgraph CNV[\" Conversations & Inbox \"]\n    Conversation\n    Message\n    Lead\n  end\n\n  subgraph SPINE[\" Employee Action Spine \"]\n    Confirmation\n    ApprovalRequest\n    Notification\n    Case\n  end\n\n  User --- Employee\n  Organization --- User\n  Organization --- Agent\n  Agent --- KnowledgeSource\n  Agent --- Conversation\n  Conversation --- Message\n  Employee --- ApprovalRequest\n  Confirmation --- ApprovalRequest\n  ApprovalRequest --- Notification\n  Employee --- Case\n```\n\n**Read this to understand:** the 30,000-ft view Рђћ how the four subsystems relate. Everything hangs off `Organization` (the tenant); `User`Рєћ`Employee` is the bridge between the platform side and the HR side.\n\n**The four subsystems**\n\n| Subsystem | Core classes | Responsibility | Primary stories |\n|---|---|---|---|\n| Identity & Governance | Organization, User, Employee, HrmsConnection, RoleBinding, AuditLog | who exists, who can do what, what happened | WA-1,3,4,5,6 ┬и EMP-1 |\n| Agent Studio & Knowledge | Agent, KnowledgeSource, KnowledgeFolder, KnowledgeChunk, ActionDefinition, Deployment | build/configure/publish/deploy colleagues + their grounding | DA-1..14 |\n| Conversations & Inbox | Conversation, Message, Lead | runtime chats (public + preview) + human handoff | EV-1..4 ┬и SA-1,3 |\n| Employee Action Spine | Confirmation, ApprovalRequest, Notification, Case | the permissionРєњconfirmРєњexecuteРєњauditРєњnotify workflow | EMP-9..16 ┬и MGR-4,5,9 |\n\n---\n\n### 3b. Identity, Org & Governance\n\n```mermaid\nclassDiagram\n  class Organization {\n    +id\n    +name\n    +slug\n  }\n  class User {\n    +id\n    +email\n    +passwordHash\n    +name\n    +orgId\n    +employeeId\n  }\n  class Employee {\n    +id\n    +externalId\n    +email\n    +name\n    +title\n    +department\n    +managerId\n    +dateOfBirth\n    +dateOfJoining\n    +gender\n    +phone\n    +orgId\n  }\n  class Payslip {\n    +id\n    +orgId\n    +employeeExternalId\n    +period\n    +basic\n    +hra\n    +grossPay\n    +totalDeduction\n    +netPay\n  }\n  class AnalyticsEvent {\n    +id\n    +orgId\n    +type\n    +actorUserId\n    +agentId\n    +domain\n    +metadata\n    +createdAt\n  }\n  class HrmsConnection {\n    +id\n    +provider\n    +config\n    +lastSyncedAt\n    +orgId\n  }\n  class RoleBinding {\n    +id\n    +userId\n    +role\n    +scopeType\n    +scopeId\n    +grantedBy\n  }\n  class AuditLog {\n    +id\n    +orgId\n    +actorUserId\n    +action\n    +targetType\n    +targetId\n    +decision\n    +before\n    +after\n  }\n\n  Organization \"1\" --> \"*\" User : employs\n  Organization \"1\" --> \"*\" Employee : org chart\n  Organization \"1\" --> \"*\" HrmsConnection : configures\n  Organization \"1\" --> \"*\" AuditLog : records\n  Organization \"1\" --> \"*\" Payslip : payroll (self-scoped read)\n  Organization \"1\" --> \"*\" AnalyticsEvent : event stream\n  Employee \"1\" --> \"*\" Payslip : earns\n  User \"1\" --> \"0..1\" Employee : JIT-linked\n  Employee \"1\" --> \"0..1\" Employee : manager\n  Employee \"1\" --> \"*\" Employee : reports\n  User \"1\" --> \"*\" RoleBinding : holds\n  RoleBinding \"*\" --> \"0..1\" Agent : colleague scope\n  note for RoleBinding \"role: owner | admin | domain_admin | support_agent | analyst\"\n  note for AuditLog \"decision: ALLOW | DENY (every write + denial logged)\"\n```\n\n**Read this to understand:** the dual identity model. A `User` is a login; an `Employee` is an HR-org record. They link 1:1 by email (JIT at login). Authorization comes from two places: `RoleBinding` (platform) and `Employee.reports` (manager). Every sensitive action writes `AuditLog`.\n\n**Classes**\n\n| Class | What it is | Key connections | Stories |\n|---|---|---|---|\n| Organization | the tenant; everything is scoped to it | owns Users, Employees, Agents, Leads, AuditLogs | WA-1 |\n| User | a login account | belongs to Org; 0..1 Employee; holds RoleBindings | EMP-1, WA-1 |\n| Employee | an HRMS person record | self-relation managerРєћreports; 0..1 User | WA-3, WA-4, MGR-1 |\n| HrmsConnection | per-org HRMS provider config | drives `syncEmployees` (mockРєњOrangeHRM) | WA-3, WA-9 |\n| RoleBinding | a platform role grant (optionally agent-scoped) | UserРєњrole; scopeIdРєњAgent | WA-5, DA-14 |\n| AuditLog | append-only record of writes + denials | OrgРєњlogs; ALLOW/DENY | WA-6, MGR-8, EV-5 |\n\n**Connections (edges) and the stories behind them**\n\n| Edge | Meaning | Story |\n|---|---|---|\n| User Рєњ Employee (JIT-linked) | login mapped to HR identity on first sign-in | EMP-1, WA-3 |\n| Employee Рєњ manager / reports | the org chart that powers manager scope | MGR-1, MGR-8 |\n| User Рєњ RoleBinding | platform permissions (owner/admin/Рђд) | WA-5 |\n| RoleBinding Рєњ Agent (colleague scope) | a Domain Admin scoped to one colleague | DA-14 |\n| Org Рєњ AuditLog | governance trail for every write/denial | WA-6 |\n\n---\n\n### 3c. Agent Studio & Knowledge\n\n```mermaid\nclassDiagram\n  class Agent {\n    +id\n    +name\n    +domain\n    +purpose\n    +instructions\n    +greeting\n    +published\n    +deployed\n    +accessMode\n    +liveHandover\n    +publishedConfig\n    +guardrails\n    +voiceConfig\n    +orgId\n    +createdBy\n  }\n  class KnowledgeSource {\n    +id\n    +name\n    +trainedStatus\n    +orgId\n  }\n  class KnowledgeFolder {\n    +id\n    +name\n    +allowedRoles\n    +sourceId\n  }\n  class KnowledgeChunk {\n    +id\n    +content\n    +embedding\n    +folderId\n  }\n  class KnowledgeUrl {\n    +id\n    +url\n  }\n  class KnowledgeFile {\n    +id\n    +fileName\n    +blobUrl\n  }\n  class AgentKnowledgeSource {\n    +agentId\n    +knowledgeSourceId\n  }\n  class ActionCategory {\n    +id\n    +name\n  }\n  class ActionApp {\n    +id\n    +name\n  }\n  class ActionDefinition {\n    +id\n    +name\n    +config\n  }\n  class AgentAction {\n    +agentId\n    +actionId\n    +enabled\n  }\n  class Deployment {\n    +id\n    +agentId\n    +channel\n    +enabled\n  }\n\n  Agent \"1\" --> \"*\" AgentKnowledgeSource\n  KnowledgeSource \"1\" --> \"*\" AgentKnowledgeSource\n  KnowledgeSource \"1\" --> \"*\" KnowledgeUrl\n  KnowledgeSource \"1\" --> \"*\" KnowledgeFile\n  KnowledgeSource \"1\" --> \"*\" KnowledgeChunk\n  KnowledgeSource \"1\" --> \"*\" KnowledgeFolder\n  KnowledgeFolder \"1\" --> \"*\" KnowledgeChunk : FolderChunks\n  ActionCategory \"1\" --> \"*\" ActionApp\n  ActionApp \"1\" --> \"*\" ActionDefinition\n  Agent \"1\" --> \"*\" AgentAction\n  ActionDefinition \"1\" --> \"*\" AgentAction\n  Agent ..> Deployment : agentId loose ref\n  note for KnowledgeFolder \"allowedRoles drives filter-then-prompt access control\"\n  note for Agent \"publishedConfig is the snapshot served to public chat\"\n```\n\n**Read this to understand:** how a colleague is assembled. An `Agent` points at knowledge (many-to-many via a join) and skills (many-to-many via a join). Knowledge is chunked + embedded for retrieval, and folders carry the access rules.\n\n**Classes**\n\n| Class | What it is | Key connections | Stories |\n|---|---|---|---|\n| Agent | a configurable AI colleague | M:N KnowledgeSource & ActionDefinition; has Conversations | DA-1,2,3,4,5 |\n| KnowledgeSource | a container of knowledge for an org | has Urls, Files, Chunks, Folders | DA-7 |\n| KnowledgeFolder | grouping with `allowedRoles[]` | gates which chunks a user may retrieve | DA-8, EMP-6 |\n| KnowledgeChunk | embedded text slice (`vector(1536)`) | belongs to source; optional folder | EMP-3 (citations) |\n| AgentKnowledgeSource | join table (Agent Рєћ KnowledgeSource) | the M:N link | DA-7 |\n| ActionCategory/App/Definition | the skills catalog hierarchy | Definition Рєњ AgentAction | DA-10 |\n| AgentAction | a skill attached to an agent (enabled flag) | Agent Рєћ ActionDefinition | DA-10, DA-11 |\n| Deployment | per-channel deploy record (loose ref) | web/voice/slack/teams | DA-5, DA-VOICE |\n\n**Connections and stories**\n\n| Edge | Meaning | Story |\n|---|---|---|\n| Agent Рєћ KnowledgeSource (via join) | which knowledge a colleague can use | DA-7 |\n| KnowledgeFolder Рєњ Chunk + allowedRoles | filter-then-prompt access control | DA-8 |\n| Agent Рєћ ActionDefinition (via AgentAction) | which skills/tools a colleague can call | DA-10, DA-11 |\n| Agent Рєњ Deployment | multi-channel availability (web now; voice later) | DA-5 |\n\n---\n\n### 3d. Conversations & Inbox\n\n```mermaid\nclassDiagram\n  class Conversation {\n    +id\n    +agentId\n    +userId\n    +visitorName\n    +visitorEmail\n    +status\n    +handedOff\n    +channel\n  }\n  class Message {\n    +id\n    +conversationId\n    +role\n    +content\n    +sources\n    +senderId\n  }\n  class Lead {\n    +id\n    +name\n    +email\n    +phone\n    +status\n    +orgId\n    +capturedBy\n  }\n\n  Agent \"1\" --> \"*\" Conversation : handles\n  Conversation \"1\" --> \"*\" Message\n  User \"0..1\" --> \"*\" Conversation : owns internal\n  User \"0..1\" --> \"*\" Message : sent as agent\n  Organization \"1\" --> \"*\" Lead\n  note for Conversation \"Inbox shows ONLY handedOff=true AND channel not preview\"\n```\n\n**Read this to understand:** runtime chats and the privacy gate. Only *public* and *preview* chats persist as `Conversation`; the employee VA does not. The inbox only ever exposes escalated (`handedOff`), non-preview conversations.\n\n**Classes**\n\n| Class | What it is | Key connections | Stories |\n|---|---|---|---|\n| Conversation | a chat thread (public visitor or builder preview) | belongs to Agent; has Messages; `handedOff`, `channel` | EV-1, SA-1, DA-6 |\n| Message | one turn (user / assistant / agent) | belongs to Conversation; optional human sender | EMP-4, SA-3 |\n| Lead | captured contact from public chat | belongs to Org | EV-3 |\n\n**Connections and stories**\n\n| Edge | Meaning | Story |\n|---|---|---|\n| Agent Рєњ Conversation | the agent that handled the chat | EV-1 |\n| Conversation Рєњ Message | the turns of the thread | EMP-4 |\n| Conversation.handedOff (the inbox gate) | only escalated convos reach a human | EV-4, SA-1 |\n| channel=preview (excluded) | builder test chats stay out of inbox/analytics | DA-6 |\n| User Рєњ Message (sender) | a human agent's reply | SA-3 |\n| Org Рєњ Lead | visitor contact capture | EV-3 |\n\n> **Privacy note (from the last fix):** the Employee VA (`/api/assistant/chat`) has **no edge into `Conversation`** Рђћ employeeРєћbot HR chats are never persisted, so they can't appear in the inbox.\n\n---\n\n### 3e. Employee Action Spine (the permission Рєњ confirm Рєњ execute Рєњ audit Рєњ notify flow)\n\n```mermaid\nclassDiagram\n  class Confirmation {\n    +id\n    +userId\n    +orgId\n    +agentId\n    +skill\n    +payload\n    +status\n    +expiresAt\n  }\n  class ApprovalRequest {\n    +id\n    +orgId\n    +type\n    +requesterEmployeeId\n    +approverEmployeeId\n    +externalRef\n    +payload\n    +status\n  }\n  class Notification {\n    +id\n    +userId\n    +type\n    +payload\n    +link\n    +read\n  }\n  class Case {\n    +id\n    +orgId\n    +agentId\n    +requesterUserId\n    +summary\n    +status\n    +severity\n    +assignedToUserId\n  }\n  class CaseMessage {\n    +id\n    +caseId\n    +authorType\n    +content\n  }\n\n  Employee ..> ApprovalRequest : requester\n  Employee ..> ApprovalRequest : approver\n  Confirmation ..> ApprovalRequest : on confirm submitForApproval\n  ApprovalRequest ..> Notification : notify approver and requester\n  Case \"1\" --> \"*\" CaseMessage\n  Employee ..> Case : requester\n  note for Confirmation \"Write skills run only after the user confirms (10-min TTL)\"\n  note for ApprovalRequest \"Loose coupling: references Employee by ID, no FK, so HRMS is swappable\"\n```\n\n---\n\n**Read this to understand:** the heart of the product Рђћ how a write action goes from intent to executed, safely. These four classes implement the action spine and are deliberately ID-linked (no FKs) so the HRMS can be swapped.\n\n**Classes**\n\n| Class | What it is | Key connections | Stories |\n|---|---|---|---|\n| Confirmation | a pending write awaiting user consent (10-min TTL) | created by write skills; on confirm Рєњ execute | EMP-12, DA-11 |\n| ApprovalRequest | a request routed to a manager | requester+approver Employee (by ID); `externalRef` to leave | EMP-9, MGR-5 |\n| Notification | in-app message to a user | approval_pending / approval_decided / case_update | EMP-16, MGR-9 |\n| Case | an escalation ticket | has CaseMessages; requester/assignee by ID | EMP-13, EMP-15 |\n| CaseMessage | a turn in a case thread | belongs to Case | EMP-15 |\n\n**The spine, step by step (and the stories at each step)**\n\n| Step | What happens | Entities | Story |\n|---|---|---|---|\n| 1. Permission | `canAsUser` checks employee/manager capability | Рђћ | cross-cutting |\n| 2. Confirm | write skill creates a `Confirmation`; user must confirm | Confirmation | EMP-12 |\n| 3. Execute | on confirm, `applyLeave` runs Рєњ routes to manager | ApprovalRequest | EMP-9 |\n| 4. Audit | every write + denial logged | AuditLog | WA-6 |\n| 5. Notify | approver notified; on decision, requester notified | Notification | MGR-9, EMP-16 |\n| Decision | manager approves/rejects Рєњ executes + audits + notifies | ApprovalRequest, AuditLog, Notification | MGR-5 |\n| Escalation | unresolved Рєњ `Case` opened with an ID | Case, CaseMessage | EMP-13 |\n\n> **Why loose coupling:** `ApprovalRequest`/`Case` store `requesterEmployeeId` as a plain string (no FK). This is intentional Рђћ when the real OrangeHRM provider replaces the mock, employee identity can change shape without breaking these tables.\n\n---\n\n## 4. \"What's connected to what\" Рђћ the wiring map\n\n```mermaid\nflowchart LR\n  subgraph Client\n    EVAUI[\" /assistant (Employee VA) \"]\n    INBOXUI[\" /inbox \"]\n    APPRUI[\" /approvals \"]\n    BUILDUI[\" /agents Studio \"]\n    PUBUI[\" /chat/[id] (public) \"]\n  end\n\n  EVAUI --> ASSIST[/\"POST /api/assistant/chat\"/]\n  ASSIST --> REG[\" skill registry \"]\n  REG --> READ[\" read skills: balance, profile \"]\n  REG --> CONF[/\"POST /api/confirmations\"/]\n  CONF --> LEAVE[\" applyLeave / cancelLeave \"]\n  LEAVE --> SUBMIT[\" submitForApproval \"]\n  SUBMIT --> AR[(ApprovalRequest)]\n  SUBMIT --> NOTIF[(Notification)]\n  REG --> CASE[\" createCase \"] --> CASEDB[(Case)]\n\n  APPRUI --> APPRAPI[/\"GET/POST /api/approvals\"/]\n  APPRAPI --> DECIDE[\" decideApproval \"]\n  DECIDE --> AR\n  DECIDE --> NOTIF\n  DECIDE --> AUDIT[(AuditLog)]\n\n  PUBUI --> PUBAPI[/\"POST /api/chat/[id]\"/]\n  PUBAPI -->|handover| CONVDB[(Conversation handedOff=true)]\n  INBOXUI --> CONVAPI[/\"GET /api/conversations\"/]\n  CONVAPI -->|inbox.view| CONVDB\n\n  BUILDUI --> AGENTAPI[/\"/api/agents + publish + deploy\"/]\n  AGENTAPI --> AGENTDB[(Agent)]\n  AGENTAPI --> RAG[\" searchKnowledge (role-filtered) \"]\n  RAG --> CHUNKS[(KnowledgeChunk + Folder.allowedRoles)]\n\n  ASSIST --> RAG\n\n  classDef store fill:#e6f7ef,stroke:#3ecf8e;\n  class AR,NOTIF,CASEDB,AUDIT,CONVDB,AGENTDB,CHUNKS store;\n```\n\n**Read this to understand:** the runtime call paths Рђћ UI Рєњ API Рєњ skill/service Рєњ data store Рђћ and how the same data stores are shared across surfaces. Use this when tracing \"where does this request go?\".\n\n**End-to-end story traces through the wiring**\n\n| Flow | Path | Stories |\n|---|---|---|\n| Apply leave end-to-end | `/assistant` Рєњ `/api/assistant/chat` Рєњ registry Рєњ `/api/confirmations` Рєњ `applyLeave` Рєњ `submitForApproval` Рєњ `ApprovalRequest` + `Notification` | EMP-9, EMP-12, MGR-9 |\n| Manager decides | `/approvals` Рєњ `/api/approvals` Рєњ `decideApproval` Рєњ `ApprovalRequest` + `AuditLog` + `Notification` | MGR-5, EMP-16 |\n| Escalate to case | `/assistant` Рєњ `create_case` Рєњ `Case` | EMP-13 |\n| Public chat + handover | `/chat/[id]` Рєњ `/api/chat/[id]` Рєњ `Conversation(handedOff=true)` Рєњ `/inbox` | EV-1, EV-4, SA-1 |\n| Grounded answer | `/assistant` or `/api/agents/[id]/chat` Рєњ `searchKnowledge` Рєњ `KnowledgeChunk` (role-filtered) | EMP-3, DA-8 |\n| Build & publish | `/agents` Рєњ `/api/agents` + publish + deploy Рєњ `Agent.publishedConfig` | DA-1, DA-4, DA-5 |\n\n---\n\n### Cross-cutting reusable seams (applied on every write)\n1. **`can()` / `requireCan()`** Рђћ platform RBAC gate (builder/governance writes).\n2. **`canAsUser()`** Рђћ delegated employee/manager gate (the AI acts as the user).\n3. **`audit()` / `auditDeny()`** Рђћ every write and every denial is logged to `AuditLog`.\n4. **Confirmation gate** Рђћ write skills create a `Confirmation` and only execute on explicit user confirm.\n5. **Filter-then-prompt** Рђћ `searchKnowledge` excludes `KnowledgeFolder.allowedRoles` the user lacks.\n6. **Published-snapshot enforcement** Рђћ public chat serves `Agent.publishedConfig`, never the live draft.\n7. **Provider interface** Рђћ `HrmsProvider` (mock today, OrangeHRM adapter) swappable by config.\n\n---\n\n## 5. Sequence Diagrams (timing & order)\n\n> Class and use-case diagrams show *structure*; these show *order over time* Рђћ exactly when each call happens and where the guards sit.\n\n### 5a. Apply leave Рєњ manager approves (the full action spine)\n\n```mermaid\nsequenceDiagram\n  autonumber\n  actor E as Employee (Carol)\n  participant VA as Assistant API\n  participant LLM as Azure OpenAI\n  participant CF as Confirmations API\n  participant SK as Leave Skill\n  participant AP as Approval Service\n  participant DB as Database\n  actor M as Manager (Eve)\n  participant AR as Approvals API\n  participant NT as Notifications API\n  E->>VA: Apply 2 days PTO 06-20 to 06-21\n  VA->>LLM: chat with HR tools\n  LLM-->>VA: tool_call apply_leave\n  VA->>DB: create Confirmation pending (10-min TTL)\n  VA-->>E: confirmation card (id + summary)\n  E->>CF: POST confirm (confirmationId)\n  CF->>DB: Confirmation status = confirmed\n  CF->>SK: executeWriteSkill apply_leave\n  SK->>SK: requestId = shortId LV\n  SK->>AP: submitForApproval (requester, approver = manager)\n  AP->>DB: insert ApprovalRequest pending (externalRef LV-xxxx)\n  AP->>DB: insert Notification approval_pending to approver\n  AP->>DB: audit leave.apply + approval.submit\n  SK-->>E: LV-xxxx submitted, sent to Eve for approval\n  Note over M,NT: Manager decides in a separate session\n  M->>AR: GET /api/approvals\n  AR->>DB: pending where approverEmployeeId = Eve plus requester names\n  AR-->>M: pending list shows Carol request\n  M->>AR: POST decision approved (approvalId)\n  AR->>AP: decideApproval\n  AP->>AP: guard not-self and is-approver\n  AP->>DB: ApprovalRequest status = approved\n  AP->>DB: audit leave.approved (externalRef)\n  AP->>DB: insert Notification approval_decided to requester\n  AR-->>M: status approved\n  E->>NT: GET /api/notifications (bell)\n  NT-->>E: Your leave was approved\n```\n\n**Read this to understand:** the exact order of the *permission Рєњ confirm Рєњ execute Рєњ audit Рєњ notify* spine, and that the write (`submitForApproval`) only happens **after** the user confirms (steps 6РђЊ10). The manager half (steps 16РђЊ24) runs in a different session/browser.\n\n**The two critical guards (and when they fire)**\n| Step | Guard | Story |\n|---|---|---|\n| 4РђЊ6 | Write is **not executed** until a `Confirmation` is created and the user confirms | EMP-12 |\n| 21 | `decideApproval` rejects **self-approval** and **non-approver** before mutating | MGR-8 |\n| 13, 22 | Both sides are notified (approver on submit, requester on decision) | MGR-9, EMP-16 |\n\n**Stories realized:** EMP-9 (apply from chat), EMP-12 (confirm-first), MGR-4 (see pending), MGR-5 (decide), MGR-9 (notify approver), EMP-16 (notify requester).\n\n### 5b. Public chat Рєњ live human handover\n\n```mermaid\nsequenceDiagram\n  autonumber\n  actor V as Visitor (anon)\n  participant PG as Public Chat Page\n  participant PA as Public Chat API\n  participant CFG as buildEffectiveConfig\n  participant LLM as Azure OpenAI\n  participant DB as Database\n  actor SA as Support Agent\n  participant IN as Inbox API\n  participant SG as Suggest API\n  participant MS as Messages API\n  V->>PG: open /chat/agentId\n  PG->>PA: GET agent (published and deployed)\n  PA-->>PG: greeting plus published config\n  V->>PA: POST message hello\n  PA->>DB: find or create Conversation (channel web) plus user Message\n  PA->>CFG: load published snapshot\n  PA->>DB: searchKnowledge public KB only\n  PA->>LLM: chat grounded\n  PA->>DB: insert assistant Message\n  PA-->>V: bot reply\n  V->>PA: POST talk to a human\n  PA->>PA: liveHandover ON and keyword match\n  PA->>DB: Conversation handedOff = true, status handed_off\n  PA-->>V: connecting you to a live agent\n  Note over SA,MS: Human agent picks it up\n  SA->>IN: GET /api/conversations (requires inbox.view)\n  IN->>DB: where handedOff = true AND channel not preview\n  IN-->>SA: escalated conversation appears\n  SA->>SG: POST suggest (AI draft reply)\n  SG-->>SA: suggested response\n  SA->>MS: POST reply (role agent)\n  MS->>DB: insert agent Message\n  MS-->>V: human agent reply delivered\n```\n\n**Read this to understand:** why a conversation is invisible to humans **until** the visitor escalates. The bot handles steps 4РђЊ10 privately; only step 13 sets `handedOff=true`, and only then (step 15РђЊ16) does it appear in the agent's inbox Рђћ gated by `inbox.view`.\n\n**The privacy gates (and when they fire)**\n| Step | Gate | Story |\n|---|---|---|\n| 2 | Public chat serves the **published snapshot**, never the live draft | DA-4 |\n| 7 | Retrieval is **public KB only** (filter-then-prompt) | EV-2, DA-8 |\n| 13 | Conversation enters the inbox **only on handover** | EV-4 |\n| 15 | Inbox read requires `inbox.view`; `channel=preview` excluded | SA-1, SA-6 |\n\n**Stories realized:** EV-1 (public chat), EV-2 (public KB only), EV-4 (escalate), SA-1 (queue), SA-3 (read context + reply), DA-4 (published snapshot).\n\n---\n\n## 6. Notable design decisions (visible in the diagrams)\n\n- **Two-axis authorization.** Platform roles (RoleBinding) and HRMS roles (employee/manager) are orthogonal and combine per user.\n- **Loose coupling of the action spine.** `Confirmation`, `ApprovalRequest`, `Notification`, `Case` reference users/employees **by ID (no FK relations)**. This is deliberate: it lets the HRMS provider be swapped and avoids hard FK coupling to the org chart.\n- **Privacy by escalation.** EmployeeРєћbot chats (`/api/assistant/chat`) are **not persisted**. Only escalated public conversations (`handedOff=true`, `channel!=preview`) ever enter the Live Inbox, gated by `inbox.view`.\n- **Preview isolation.** Builder test chats are tagged `channel=preview` and excluded from inbox + analytics.\n\n---\n\n## 7. Where to look (role Рєњ diagram coverage)\n\n| If you are / care aboutРђд | Read these diagrams | Stories covered |\n|---|---|---|\n| Employee experience | 2a, 3d, 3e | EMP-1..18 |\n| Manager / approvals | 2b, 3e | MGR-1..12 |\n| Support / inbox | 2c, 3d | SA-1..6 |\n| Analyst / metrics | 2c, 3d | AN-1..5 |\n| Builder (Domain Admin) | 2d, 3c | DA-1..16 |\n| Owner / governance | 2d, 3b | WA-1..12 |\n| Public visitor | 2a, 3d | EV-1..5 |\n| Data model overview | 3a Рєњ 3b/3c/3d/3e | all |\n| Runtime call paths | 4 | end-to-end traces |\n\n**Coverage note:** 74 stories across 7 roles (`PLANNING.md ┬Д3`). РюЁ items are built & deployed; ­ЪЪА are partial/mock (notably voice, claim/notes in inbox, reminders, billing). Every diagram edge above traces to at least one story; every РюЁ story traces to at least one diagram.\n\n---\n\n## 4. HRMS Agentic Deepening (Frappe = source of truth)\n\n> Added in the agentic-deepening sprint. **Principle:** every read pulls from Frappe HR; every\n> action **writes back to Frappe** (confirm-gated Рєњ passport-gated Рєњ audited Рєњ analytics event).\n> Provider methods live behind the `HrmsProvider` interface so the Zoho swap stays config-only.\n\n### 4a. Skill registry (current)\n\n```mermaid\nclassDiagram\n  class HrmsProvider {\n    <<interface>>\n    +listEmployees()\n    +getLeaveBalance()\n    +createLeaveApplication()\n    +decideLeaveApplication(name, decision)\n    +cancelLeaveApplication(name)\n    +getHolidays()\n    +getLeaveTypes()\n    +getLeaveApplications(ids, fromDate)\n    +createExpenseClaim(params)\n    +listExpenseClaims(externalId)\n    +createCheckin(externalId, logType)\n  }\n  class ReadSkills {\n    get_profile\n    get_leave_balance\n    get_hr_contact\n    get_upcoming_birthdays\n    get_work_anniversaries\n    get_holidays\n    get_leave_types\n    get_team_on_leave  // FR-20, manager-scoped\n    get_reimbursement_status\n    get_payslips  // FR-12/13, self-scoped + masked\n  }\n  class WriteSkills {\n    apply_leave        // Рєњ Frappe Leave Application (HR-LAP)\n    cancel_leave       // Рєњ cancel Frappe doc\n    submit_expense     // Рєњ Frappe Expense Claim (HR-EXP)\n    check_attendance   // Рєњ Frappe Employee Checkin (IN/OUT)\n    request_document\n    reset_password\n    request_access\n    create_case\n  }\n  FrappeHrmsProvider ..|> HrmsProvider\n  WriteSkills --> HrmsProvider : write-back\n  ReadSkills --> HrmsProvider : live read\n```\n\n### 4b. Leave approval round-trip (real write-back)\n\n```mermaid\nsequenceDiagram\n  participant E as Employee\n  participant VA as Assistant\n  participant F as Frappe HR\n  participant M as Manager\n  E->>VA: apply_leave (confirm)\n  VA->>F: create Leave Application Рєњ HR-LAP-Рђд (Open)\n  VA->>M: route ApprovalRequest (externalRef = HR-LAP-Рђд)\n  M->>VA: approve\n  VA->>F: decideLeaveApplication(HR-LAP-Рђд, approved) Рєњ status Approved (+submit)\n  Note over F: balance reflects in the system of record\n```\n\n### 4c. BRD coverage delta\n- **FR-03** (what-if) ┬и **FR-04** (company-policy vs general labeling + citation) Рђћ in the assistant prompt.\n- **FR-20** (team leave calendar) Рђћ `get_team_on_leave`, manager-scoped.\n- **FR-12 / FR-13** (payslips + explain) Рђћ `get_payslips`, strictly self-scoped (NFR-02/05), audited (NFR-04).\n- **FR-41** (actions with confirmation + transaction ID) Рђћ real Frappe IDs (HR-LAP / HR-EXP / EMP-CKIN).\n- **BRD Phase 5** (proactive intelligence) Рђћ birthdays / anniversaries / holidays Celebrations widget.\n\n### 4d. Honest limitation\nPayroll **Salary Slips** are MVP-seeded in our Postgres (`Payslip`) because the Frappe trial's payroll\nauto-calc is blocked by a holiday-list validation quirk. The read path can target Frappe `Salary Slip`\nin production via a provider method. Appraisal / Training / Onboarding modules exist in Frappe but have\nno data yet Рђћ same seed-then-read pattern would apply (fast-follow).\n"</script>
<script>
  const source = JSON.parse(document.getElementById('md').textContent);

  // Render markdown (fenced mermaid blocks are converted below)
  marked.setOptions({ gfm:true, breaks:false });
  const contentEl = document.getElementById('content');
  contentEl.innerHTML = marked.parse(source);

  // Convert <code class="language-mermaid"> blocks into <div class="mermaid">
  document.querySelectorAll('code.language-mermaid').forEach(code => {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = code.textContent;
    code.closest('pre').replaceWith(div);
  });

  // Give headings ids + build the TOC (h2 + h3)
  const toc = document.getElementById('toc');
  let n = 0;
  contentEl.querySelectorAll('h2, h3').forEach(h => {
    const id = 'sec-' + (n++);
    h.id = id;
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent;
    if (h.tagName === 'H3') a.className = 'h3';
    toc.appendChild(a);
  });

  // Mermaid with a green theme to match the product
  mermaid.initialize({
    startOnLoad:false,
    theme:'base',
    themeVariables:{
      primaryColor:'#eafaf1', primaryBorderColor:'#3ecf8e', primaryTextColor:'#08301d',
      lineColor:'#5b9c80', secondaryColor:'#f3f4f3', tertiaryColor:'#ffffff',
      fontFamily:'-apple-system,Segoe UI,Inter,sans-serif', fontSize:'13px',
      actorBkg:'#eafaf1', actorBorder:'#3ecf8e', actorTextColor:'#08301d',
      noteBkgColor:'#fff7e6', noteBorderColor:'#f5c66b'
    }
  });
  mermaid.run({ querySelector:'.mermaid' });

  // Scroll-spy: highlight active TOC item
  const links = [...toc.querySelectorAll('a')];
  const map = new Map(links.map(a => [a.getAttribute('href').slice(1), a]));
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        map.get(e.target.id)?.classList.add('active');
      }
    });
  }, { rootMargin:'0px 0px -75% 0px' });
  contentEl.querySelectorAll('h2, h3').forEach(h => obs.observe(h));
</script>
